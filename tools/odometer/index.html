  <h1 id="碼表">碼表</h1>
<script>
	var b, st, t = 0;
	function strt() {
		if (b)
			return;
		st = Date.now() - t;
		b = setInterval(() => {
			t = Date.now() - st;
			tmr();
		}, 10);
	}
	function stp() {
		clearInterval(b);
		b = null;
	}
	function rst() {
		stp();
		t = 0;
		tmr();
	}
	function tmr() {
		document.getElementById("tmr").innerText = 
			String(Math.floor(t / 3600000)).padStart(2, '0') + ':' + 
			String(Math.floor((t % 3600000) / 60000)).padStart(2, '0') + ':' + 
			String(Math.floor((t % 60000) / 1000)).padStart(2, '0') + '.' + 
			String(Math.floor((t % 1000) / 10)).padStart(2, '0');
	}
</script>
<div class="timer" id="tmr">00:00:00.00</div>
<button onclick="strt()">開始</button>
<button onclick="stp()">停止</button>
<button onclick="rst()">重置</button>
